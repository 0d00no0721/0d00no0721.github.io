<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语言模拟器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }

        h1 {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
            font-size: 14px;
        }
        a.back {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 24px;
        }
        a.back:hover { text-decoration: underline; }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 48px;
        }
        .card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 32px 24px;
            text-align: center;
            border: 1px solid #2a2a4a;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.15);
            border-color: #667eea;
        }
        .card .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .card .name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .card .badge {
            display: inline-block;
            background: #2a2a4a;
            color: #888;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 12px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a2a4a;
        }
        .provider-group {
            margin-bottom: 28px;
        }
        .provider-name {
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 12px;
        }
        .model-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 8px;
            gap: 12px;
        }
        .model-row .model-name {
            font-size: 14px;
            font-weight: 500;
            min-width: 200px;
        }
        .model-row .model-status {
            flex: 1;
            font-size: 13px;
            color: #888;
            min-height: 20px;
            word-break: break-all;
        }
        .model-row .model-status.success { color: #4caf50; }
        .model-row .model-status.error { color: #f44336; }
        .model-row .model-status.loading { color: #ff9800; }
        .btn {
            padding: 6px 18px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .btn-test {
            background: #667eea;
            color: #fff;
        }
        .btn-test:hover { background: #5a6fd6; }
        .btn-test:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }

        @media (max-width: 640px) {
            .cards { grid-template-columns: 1fr; }
            .model-row { flex-wrap: wrap; }
            .model-row .model-name { min-width: unset; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="back" href="/ideas">&larr; 返回奇思妙想</a>
        <h1>语言模拟器</h1>
        <p class="subtitle">选择一种语言风格，与 AI 对话</p>

        <div class="cards">
            <a class="card" href="/ideas/sim/yau/">
                <div class="icon">🗣️</div>
                <div class="name">粤语 (Yau)</div>
                <div class="badge">正在开发中</div>
            </a>
            <a class="card" href="/ideas/sim/zhouli/">
                <div class="icon">📜</div>
                <div class="name">周礼</div>
                <div class="badge">正在开发中</div>
            </a>
            <a class="card" href="/ideas/sim/bible/">
                <div class="icon">⛪</div>
                <div class="name">圣经</div>
                <div class="badge">正在开发中</div>
            </a>
        </div>

        <div class="section-title">API 连通性测试</div>

        <div class="provider-group">
            <div class="provider-name">DeepSeek 官方</div>
            <div class="model-row" data-provider="deepseek" data-model="deepseek-v4-flash">
                <span class="model-name">deepseek-v4-flash</span>
                <span class="model-status">就绪</span>
                <button class="btn btn-test" onclick="testModel(this)">测试连接</button>
            </div>
        </div>

        <div class="provider-group">
            <div class="provider-name">USTC</div>
            <div class="model-row" data-provider="ustc" data-model="deepseek-v4-pro">
                <span class="model-name">deepseek-v4-pro</span>
                <span class="model-status">就绪</span>
                <button class="btn btn-test" onclick="testModel(this)">测试连接</button>
            </div>
            <div class="model-row" data-provider="ustc" data-model="deepseek-v4-flash-ascend">
                <span class="model-name">deepseek-v4-flash-ascend</span>
                <span class="model-status">就绪</span>
                <button class="btn btn-test" onclick="testModel(this)">测试连接</button>
            </div>
            <div class="model-row" data-provider="ustc" data-model="qwen3.6-chat">
                <span class="model-name">qwen3.6-chat</span>
                <span class="model-status">就绪</span>
                <button class="btn btn-test" onclick="testModel(this)">测试连接</button>
            </div>
            <div class="model-row" data-provider="ustc" data-model="qwen3.6-reasoner">
                <span class="model-name">qwen3.6-reasoner</span>
                <span class="model-status">就绪</span>
                <button class="btn btn-test" onclick="testModel(this)">测试连接</button>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://miaomiatools.shigan2006.workers.dev'

        async function testModel(btn) {
            const row = btn.closest('.model-row')
            const provider = row.dataset.provider
            const model = row.dataset.model
            const statusEl = row.querySelector('.model-status')

            btn.disabled = true
            statusEl.className = 'model-status loading'
            statusEl.textContent = '测试中...'

            const startTime = Date.now()

            try {
                const resp = await fetch(WORKER_URL + '/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        provider,
                        model,
                        messages: [
                            { role: 'system', content: '请用一句话回复。' },
                            { role: 'user', content: '你好' }
                        ]
                    })
                })

                const elapsed = Date.now() - startTime
                const data = await resp.json()

                if (!resp.ok) {
                    statusEl.className = 'model-status error'
                    statusEl.textContent = `错误 (${resp.status}): ${data.error || JSON.stringify(data)}`
                    return
                }

                const reply = data.choices?.[0]?.message?.content || '(无回复内容)'
                const truncated = reply.length > 80 ? reply.slice(0, 80) + '...' : reply
                statusEl.className = 'model-status success'
                statusEl.textContent = `✅ ${elapsed}ms — ${truncated}`
            } catch (err) {
                statusEl.className = 'model-status error'
                statusEl.textContent = `请求失败: ${err.message}`
            } finally {
                btn.disabled = false
            }
        }
    </script>
</body>
</html>
