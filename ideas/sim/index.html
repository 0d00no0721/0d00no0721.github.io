<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语言模拟器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 {
            font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; color: #888; margin-bottom: 40px; font-size: 14px; }
        a.back {
            display: inline-block; color: #667eea; text-decoration: none; font-size: 14px; margin-bottom: 24px;
        }
        a.back:hover { text-decoration: underline; }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 48px;
        }
        .card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 32px 24px;
            text-align: center;
            border: 1px solid #2a2a4a;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.15);
            border-color: #667eea;
        }
        .card .icon { font-size: 48px; margin-bottom: 16px; }
        .card .name { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .card .desc { font-size: 13px; color: #888; }

        @media (max-width: 640px) {
            .cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="back" href="/ideas">&larr; 返回奇思妙想</a>
        <h1>语言模拟器</h1>
        <p class="subtitle">选择一种语言风格</p>
        <div class="cards">
            <a class="card" href="/ideas/sim/yau/">
                <div class="icon">📐</div>
                <div class="name">丘成桐 (Yau)</div>
                <div class="desc">模拟丘成桐的发言风格对话</div>
            </a>
            <a class="card" href="/ideas/sim/zhouli/">
                <div class="icon">📜</div>
                <div class="name">周礼</div>
                <div class="desc">将现代中文改写成"合乎周礼"腔调</div>
            </a>
            <a class="card" href="/ideas/sim/bible/">
                <div class="icon">⛪</div>
                <div class="name">圣经</div>
                <div class="desc">将文本改写为中文 NET 圣经风格</div>
            </a>
        </div>
    </div>
</body>
</html>
