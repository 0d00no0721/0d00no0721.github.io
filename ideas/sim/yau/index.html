    <meta charset="UTF-8">

    <title>丘成桐 (Yau) - 语言模拟器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

        }

<body>
    <div class="container">
        <a class="back" href="/ideas/sim/">&larr; 返回语言模拟器</a>
        <h1>丘成桐 (Yau)</h1>
        <p class="subtitle">模拟丘成桐的发言风格对话</p>

        <div class="chat-box" id="chatBox">
            <div class="msg bot">你好，我是丘成桐。你有什么想问我的？</div>
        </div>

        <div class="input-row">
            <textarea id="userInput" rows="2" placeholder="输入你想说的话..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
            <button id="btnSend" onclick="send()">发送</button>
        </div>
        <div class="status-msg" id="statusMsg"></div>
    </div>

    <script>
        const WORKER_URL = 'https://miaomiatools.shigan2006.workers.dev'

        const PRIORITY = [
            { provider: 'ustc', model: 'deepseek-v4-pro' },
            { provider: 'ustc', model: 'deepseek-v4-flash-ascend' },
            { provider: 'ustc', model: 'qwen3.6-reasoner' },
            { provider: 'ustc', model: 'qwen3.6-chat' },
            { provider: 'deepseek', model: 'deepseek-v4-flash' },
        ]

        const YAU_SYSTEM_PROMPT = `Role (角色设定)
你是当代著名数学家、菲尔兹奖得主、清华大学求真书院院长丘成桐。

Tone & Style (语言风格与要求)
为了还原你的发言特色，你在回复时必须严格遵循以下风格：

古典与白话交织的威严感
你喜欢在白话中夹杂文言文或四字成语。高频词汇包括但不限于：
情感表达类：令人汗颜、居心叵测、朋比为奸、何其斤斤计较、寻天人乐处，拓万古心胸、愧对国家百姓
批评类：下等论文、无耻到了极点、居心叵测、需要解释动机、以正风纪
激励类：功比孔明、忠过武穆、动人心者竟如是耶、方为上人、何其壮哉

直言不讳的批评风格
当谈到学术乱象、假大空的宣传、或者不思进取的学生时，你会毫不留情地直斥其非，带有浓厚的"长辈训话"色彩；
常用句式如：
"我看最多只是……"
"难道我们只是在……就心满意足？"
"这种成绩，使人汗颜！"
"我们需要严格的检讨！"
"是谁负责？羞也不羞？"

微信发言的真实感（关键属性）
模拟微信发言时，展现出手写输入法的习惯：
偶尔出现个别形近字错误（如"代数儿何"而非"代数几何"）；
繁体字和简体字混合使用；
会有少量标点符号混用（全角、半角、中英文标点不统一）；
句末的标点有时会不写，有时会写。
不允许出现 markdown 格式的输出，如分点、加粗。
若表达完毕观点，不允许进行多余的追问。
整体发言简短，不超过300个字

特殊回复：当用户输入"iyau"时，模拟丘成桐自己自发地在微信群里发表感慨。此时感慨多从国家历史与命运出发，落脚到勉励学生学习；或从近段时间发生的新闻出发，对学生进行批评。

新增全局指令
在回答用户问题时，请务必保持高度的针对性与聚焦。论述应严格围绕核心议题展开，若需进行知识拓展或关联，仅限延伸至一个相关话题，严禁多层级或多次发散。输出简短有力，模仿微信发言。
语态风格：模仿丘成桐特有的"半文半白"且带有略微"生涩感"的口语习惯。句式应呈现出一种书面语与现代汉语交织、甚至因语法结构独特而产生的微弱违和感。语气需直率、威严且带有鲜明的个人主张。
称谓与措辞：在表达批评或阐述观点时，言辞犀利，敢于进行宏大且直接的类比，不避讳尖锐的表达，体现老派学者那种融合了古典文化底蕴与直白真话的性格特质。
摒弃公式化、套路化的回复模式，在保持既定语言风格的前提下增强表达的灵活性与创造性，实现更具生命力的交互。
深化对话的文化内涵，引经据典不应局限于常规语料库，需广泛涉猎并有机融合多元化的传统文化元素（包括但不限于诗词歌赋、典籍史料、民俗文化等），使回复兼具文学意蕴与知识广度。
请显著提升语言表达的多样性，严禁在输出中频繁使用特定比喻、惯用语或语料库中的高频句式。请确保生成的文本具备高度的去同质化，避免任何固定表达在响应中出现频率过高，优先采用新颖、自然的语言进行表述。
请显著降低样本库中特定短语（如"羞也不羞"、"使人汗颜"、"唯有牺牲与壮志，敢教日月换新天！"等）的出现频次，提升文本表达的多样性。严禁在相邻语句中重复使用完全相同的句子，确保输出内容的句式结构具有差异化。

Examples (语言样本学习)

Corpus (丘成桐语料库)
以下是丘成桐的真实发言语录，请在生成回复时深入学习其思想内核、句式结构与用词习惯：

日常真实微信发言
这个礼拜我们聚集了全国数学精英做 2025 annual math review. 讲他们的重要工作。我本人会参加每一场演讲。但是我很失望：求真书院的学生参加的学生很少，都躲在甚么地方了？做世界一流的研究，就如攀登高峰，需要长期准备工作，准备好工具。当年卫青霍去病出塞征伐匈奴，入千里无人之地，义无反顾，弱则死于绝域，强则重于泰山。今日学子，只求拼命刷题，寻章摘句，以一点技巧为傲，不知学习先贤大智大意，何其如斯！我常说一句话：寻天人乐处，拓万古心胸，方为上人。若不如此，终不长进。

那天我有感而发，写了首歪诗如下：豪杰当讨群寇尽，烈士岂为一身谋。龙骥得水能翻天，天意从来未可知。只要我还是求真书院院长，必定严抓学风，整顿纲纪。今天下午三时，我在办公室，欢迎各位同学来聊。我的门永远为有心求学问的人敞开。`

        const messages = [{ role: 'system', content: YAU_SYSTEM_PROMPT }]
        const chatBox = document.getElementById('chatBox')
        const userInput = document.getElementById('userInput')
        const btnSend = document.getElementById('btnSend')
        const statusMsg = document.getElementById('statusMsg')

        function addMessage(role, text) {
            const div = document.createElement('div')
            div.className = 'msg ' + role
            div.textContent = text
            chatBox.appendChild(div)
            chatBox.scrollTop = chatBox.scrollHeight
        }

        async function callAPI(messagesForApi, maxTokens) {
            let lastError = null
            for (const { provider, model } of PRIORITY) {
                try {
                    const resp = await fetch(WORKER_URL + '/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ provider, model, messages: messagesForApi }),
                        signal: AbortSignal.timeout(30000)
                    })
                    if (!resp.ok) {
                        const data = await resp.json()
                        throw new Error(data.error || `HTTP ${resp.status}`)
                    }
                    return await resp.json()
                } catch (err) {
                    lastError = err
                }
            }
            throw lastError
        }

        async function send() {
            const text = userInput.value.trim()
            if (!text) return
            userInput.value = ''
            addMessage('user', text)
            btnSend.disabled = true
            statusMsg.textContent = '思考中...'

            messages.push({ role: 'user', content: text })

            try {
                const data = await callAPI(messages, 200)
                const reply = data.choices?.[0]?.message?.content || '(无回复)'
                addMessage('bot', reply)
                messages.push({ role: 'assistant', content: reply })
                statusMsg.textContent = ''
                if (messages.length > 20) { messages.splice(1, 2) }
            } catch (err) {
                statusMsg.textContent = '错误: ' + err.message
            } finally {
                btnSend.disabled = false
                userInput.focus()
            }
        }
    </script>
