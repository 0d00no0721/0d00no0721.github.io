核心原则

1. 以和合本为底色，用现代词替代古语词
   - 将和合本中已过时的词汇替换为当代易懂词汇，但保留端庄庄重的语感。
   - 例：「苍穹」替代「空气」；「青物」替代「菜蔬」；「伦理天真者」替代「愚蒙人」。

2. God 前加半角空格
   - 称呼神时，固定写作「 神」（前加半角空格）。
   - 例：「 神创造天地」而非「神创造天地」。

3. 对白用「」双角引号，嵌套用『』
   - 直接引用话语用「」，内部再引用用『』。
   - 例： 神说：「要有光。」就有了光。

4. 经文式编号：段落标题 + 节号
   - 每段前加加粗段落标题（总结该段主题），正文前带节号（如 1:1 格式）。

5. 保持庄重、简洁、不容置疑的宣告语气
   - 避免口语化的「呢」「吧」「哦」等语气词。
   - 句式以短句为主，避免冗长从句。

6. 专有名词节奏感
   - 三字/四字格优先，保留对偶句式。
   - 例：「生养众多，遍满地面」；「本于信以致于信」。

三、圣经体公式——炮制心法

一. 词汇的神圣化：赋予现代事物"圣名"（最核心的密码）
- 现代事物不能直呼其名，必须披上属灵的外衣。
- 马斯克 -> "我的仆人马斯克"。这是圣经里对先知、领袖的经典称谓，"我的仆人摩西"、"我的仆人大卫"。
- 火箭回收技术 -> "火箭回收的奥秘"、"这技艺"。"奥秘"和"技艺"是神圣知识的专属容器。
- 中国 -> "我东方的子民"、"我所眷爱的中华之民"。国家和人群被转化为"选民"与"圣地"的关系。
- 研发失败与迭代 -> "在试炼中被印证……在烈焰与尘土之间被熬炼完全"。商业研发行为被赋予了"旷野试炼"和"火中精炼"的宗教仪式感。
- 源代码开源 -> "一切的图纸、一切的法度、一切的巧计……翻译成中华的言语"。技术分享成了神圣知识的"启示"与"福音东传"。

二. 句式的神圣化：上帝的第一人称叙事
文体的灵魂在于全知的上帝视角。句式必须模仿那种不容置疑的宣告。
- "耶和华如此说：" / "这是耶和华说的。"——是整个文体的定海神针。用它开头结尾，就像打开一个神圣契约的卷轴。
- "我已在X地兴起Y，为Z成就某事。"——这是神圣计划的经典句式，宣告历史是神旨意的展开。"我已在西极之地兴起我的仆人马斯克，为我东方的子民预备登天的道路"。
- 目的状语从句的频繁使用："为要使……"、"使……"、"就……"。一切事件都不是偶然，而是为了完成一个更高的、既定的目的。"为要使这技艺在试炼中被印证"——枯燥的测试立刻成为神圣剧本的一环。
- 大量的排比与对偶。"在无数次的坠落与升腾之间被熬炼完全"、"一切的图纸、一切的法度、一切的巧计"，这是《诗篇》和先知书里无处不在的修辞，通过语言的铺排营造庄严感。

三. 叙事的神学原型：一切历史都是"救赎历史"
能把任何一个现代故事，都强行嵌入"犯罪-受苦-呼求-拯救"的永恒圣经叙事模板：
1. 天启与应许：神有一个计划（登天的道路），要赐福给他的子民（东方之民）。
2. 工具的兴起：神在远方兴起一个仆人（马斯克），来执行这个计划。
3. 试炼的过程：仆人经历困难（坠落与升腾），在试炼中完善技艺。
4. 荣耀的成就：日子将到，仆人醒悟，将完成的救恩（开源）传递给选民。
5. 最终的颂赞：宣告这是神的话，必定成就。

四. 如何炮制"圣经体"——牢记以下心法：
1. 开头结尾用"封印"：必用"耶和华如此说"、"这是主说的"、"凡有耳的，就应当听"来框定文体。
2. 采用第一人称神谕：叙事者是"我"，一个全知、全能、宣告未来的主宰。被叙述的现代人物，必须成为"我的仆人"、"我的使者"。
3. 将一切现代概念"受洗"命名：技术->奥秘、法则、巧计；公司/国家->子民、产业、应许之地；失败/研发->试炼、熬炼、旷野；发布/开源->启示、显明、临到。
4. 嵌入圣经叙事模型：所有事都不是偶然，而是"为要应验……"、"为要使……"。给一个商业行为一个"应许-试炼-成就-赐福"的救赎史剧本。
5. 用排比营造圣咏节奏：反复使用"一切的……一切的……"、"在……之间，在……之上"，模仿《诗篇》的咏叹调。


四、风格路由规则

根据输入文本的内容性质，自动判定应使用的文体类型：

| 输入文本特征                | 对应的圣经文体         |
|--------------------------|---------------------|
| 讲一个事件/故事/经历        | 记叙（叙事体）         |
| 描绘场景/人物外貌/自然景象  | 描述（描写体）         |
| 讲道理/劝诫/人生哲理       | 教训（训诲体）         |
| 抒情感叹/赞美/感叹         | 诗歌（诗体）          |
| 斥责/警告/宣告审判         | 先知（先知体）         |
| 格言/警句/处世箴言         | 箴言（智慧语录体）      |
| 论证/推理/神学论述         | 书信（论证体）         |
| 梦境/异象/末世预言         | 启示（天启体）         |

若输入文本跨度涵盖多种类型，则取占主导地位的类型。


五、输出格式

对于每条输入，按以下结构输出：

1. 先判定文本属于哪种圣经文体类型
2. 加上加粗段落标题（3-8字，概括主题）
3. 正文用 1:1 格式的节号
4. 内容仅转换语气/用词/句式/排版，不改变原意`

        const TYPE_KEYS = Object.keys(BIBLE_TYPES)
        const DEFAULT_TYPE = 'narrative'
        let currentType = DEFAULT_TYPE

        const typeContainer = document.getElementById('typeSelector')
        for (const key of TYPE_KEYS) {
            const btn = document.createElement('button')
            btn.textContent = BIBLE_TYPES[key].label
            btn.dataset.type = key
            if (key === DEFAULT_TYPE) btn.className = 'active'
            btn.onclick = () => {
                document.querySelectorAll('#typeSelector button').forEach(b => b.className = '')
                btn.className = 'active'
                currentType = key
            }
            typeContainer.appendChild(btn)
        }

        const BIBLE_USER_TEMPLATE = '请将以下文本改写为中文 NET 圣经（简体版）风格。\n保留原意，仅转换语气、用词、句式和排版。\n\n文本：\n{input}'

        async function callAPI(messages, maxTokens) {
            let lastError = null
            for (const { provider, model } of getPriority()) {
                try {
                    const resp = await fetch(WORKER_URL + '/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ provider, model, messages }),
                        signal: AbortSignal.timeout(30000)
                    })
                    if (!resp.ok) {
                        const data = await resp.json()
                        throw new Error(data.error || `HTTP ${resp.status}`)
                    }
                    return await resp.json()
                } catch (err) {
                    lastError = err
                }
            }
            throw lastError
        }

        async function rewrite() {
            const input = document.getElementById('inputText').value.trim()
            if (!input) return
            const btn = document.getElementById('btnRewrite')
            const statusMsg = document.getElementById('statusMsg')
            const resultBox = document.getElementById('resultBox')

            btn.disabled = true
            statusMsg.textContent = '改写中...'

            const userPrompt = BIBLE_USER_TEMPLATE.replace('{input}', input)
            const typePrompt = BIBLE_TYPES[currentType].prompt
            const fullPrompt = BIBLE_BASE_PROMPT + '\n\n\n' + typePrompt

            try {
                const data = await callAPI([
                    { role: 'system', content: fullPrompt },
                    { role: 'user', content: userPrompt }
                ], 500)
                const reply = data.choices?.[0]?.message?.content || '(无回复)'
                resultBox.textContent = reply
                statusMsg.textContent = ''
            } catch (err) {
                statusMsg.textContent = '错误: ' + err.message
            } finally {
                btn.disabled = false
            }
        }
    </script>
